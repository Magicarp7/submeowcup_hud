<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">

  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #101820;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 18px;
    }

    h2 {
      margin-top: 0;
    }

    .login-box {
      display: flex;
      gap: 12px;
      align-items: end;
      margin-bottom: 22px;
      padding: 14px;
      background: #14202c;
      border: 1px solid #2b3b4b;
      border-radius: 10px;
      width: fit-content;
    }

    .top {
      display: flex;
      gap: 18px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      opacity: 0.75;
    }

    input,
    select {
      width: 220px;
      padding: 9px;
      border: 1px solid #34495e;
      border-radius: 6px;
      background: #172331;
      color: white;
      font-size: 15px;
      box-sizing: border-box;
    }

    .map-settings {
      width: fit-content;
      margin-bottom: 22px;
      padding: 20px;
      background: #14202c;
      border: 1px solid #2b3b4b;
      border-radius: 10px;
    }

    .map-row {
      display: grid;
      grid-template-columns: 220px 220px 220px;
      column-gap: 28px;
      row-gap: 12px;
      margin-bottom: 14px;
    }

    .logo-preview {
      width: 42px;
      height: 42px;
      margin-top: 8px;
      border-radius: 7px;
      background: #0c131a;
      border: 1px solid #34495e;
      object-fit: contain;
      display: block;
      visibility: hidden;
    }

    .teams {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    .team {
      width: 650px;
      padding: 16px;
      background: #14202c;
      border: 1px solid #2b3b4b;
      border-radius: 10px;
    }

    .player-row {
      display: grid;
      grid-template-columns: 32px 230px 230px 52px;
      gap: 10px;
      align-items: end;
      margin-bottom: 12px;
    }

    .num {
      opacity: 0.5;
      padding-bottom: 10px;
    }

    .agent-preview {
      width: 42px;
      height: 42px;
      border-radius: 7px;
      background: #0c131a;
      border: 1px solid #34495e;
      object-fit: cover;
      display: block;
      visibility: hidden;
    }

    button {
      padding: 11px 18px;
      border: none;
      border-radius: 8px;
      background: #30f0c8;
      color: #071015;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .swap-button {
      margin-bottom: 18px;
      background: #ffcf5a;
      color: #111820;
    }

    .save-button {
      margin-top: 20px;
      font-size: 16px;
    }

    .toggle-maps-button {
      margin-bottom: 18px;
    }

    .toggle-maps-button.enabled {
      background: #ff6b7a;
      color: white;
    }

    .toggle-maps-button.disabled {
      background: #30f0c8;
      color: #071015;
    }

    .hint {
      margin-top: 14px;
      color: #a8bac8;
      font-size: 14px;
    }

    .status {
      margin-left: 14px;
      color: #30f0c8;
      font-weight: 900;
    }

    .danger {
      color: #ff6b7a;
    }
  </style>
</head>

<body>
  <h1>Редактор HUD</h1>

  <datalist id="agentsList"></datalist>

  <div class="login-box">
    <div class="field">
      <label>Email редактора</label>
      <input id="email" type="email">
    </div>

    <div class="field">
      <label>Пароль</label>
      <input id="password" type="password">
    </div>

    <button onclick="login()">Войти</button>
    <button onclick="logout()">Выйти</button>

    <span id="loginStatus" class="status">Не вошёл</span>
  </div>

  <div class="top">
    <div class="field">
      <label>Левая команда</label>
      <input id="leftTeamName">
    </div>

    <div class="field">
      <label>Правая команда</label>
      <input id="rightTeamName">
    </div>
  </div>

  <div class="map-settings">
    <h2>Карты и пики</h2>

    <button id="toggleMapsButton" class="toggle-maps-button enabled" onclick="toggleMapsVisibility()">
      Выключить карты и пики в HUD
    </button>

    <div class="top">
      <div class="field">
        <label>Логотип левой команды</label>
        <select id="leftLogo"></select>
        <img id="leftLogoPreview" class="logo-preview">
      </div>

      <div class="field">
        <label>Логотип правой команды</label>
        <select id="rightLogo"></select>
        <img id="rightLogoPreview" class="logo-preview">
      </div>
    </div>

    <div class="map-row">
      <div class="field">
        <label>Блок</label>
        <input id="map_0_label" value="CURRENT">
      </div>

      <div class="field">
        <label>Карта</label>
        <select id="map_0_name"></select>
      </div>

      <div class="field">
        <label>Кто пикнул</label>
        <select id="map_0_picker">
          <option value="none">Без логотипа</option>
          <option value="left">Левая команда</option>
          <option value="right">Правая команда</option>
        </select>
      </div>
    </div>

    <div class="map-row">
      <div class="field">
        <label>Блок</label>
        <input id="map_1_label" value="NEXT">
      </div>

      <div class="field">
        <label>Карта</label>
        <select id="map_1_name"></select>
      </div>

      <div class="field">
        <label>Кто пикнул</label>
        <select id="map_1_picker">
          <option value="none">Без логотипа</option>
          <option value="left">Левая команда</option>
          <option value="right">Правая команда</option>
        </select>
      </div>
    </div>

    <div class="map-row">
      <div class="field">
        <label>Блок</label>
        <input id="map_2_label" value="DECIDER">
      </div>

      <div class="field">
        <label>Карта</label>
        <select id="map_2_name"></select>
      </div>

      <div class="field">
        <label>Кто пикнул</label>
        <select id="map_2_picker">
          <option value="none">Без логотипа</option>
          <option value="left">Левая команда</option>
          <option value="right">Правая команда</option>
        </select>
      </div>
    </div>
  </div>

  <button class="swap-button" onclick="swapSides()">Поменять стороны местами</button>

  <div class="teams">
    <div class="team">
      <h2>Левая сторона</h2>
      <div id="leftRows"></div>
    </div>

    <div class="team">
      <h2>Правая сторона</h2>
      <div id="rightRows"></div>
    </div>
  </div>

  <button class="save-button" onclick="saveData()">Сохранить HUD</button>
  <span id="status" class="status"></span>

  <div class="hint">
    В поле агент начни писать имя агента, например Raze, Omen, Jett, после выбора картинка подставится сама
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(window.firebaseConfig);

    var auth = firebase.auth();
    var db = firebase.database();
    var hudRef = db.ref(window.HUD_PATH || "hud");

    var currentData = null;
    var agents = [];
    var logos = [];

    var mapsList = [
      "Abyss",
      "Ascent",
      "Bind",
      "Breeze",
      "Fracture",
      "Haven",
      "Icebox",
      "Lotus",
      "Pearl",
      "Split",
      "Sunset"
    ];

    function get(id) {
      return document.getElementById(id);
    }

    function defaultData() {
      return {
        showMaps: true,
        leftTeam: {
          name: "LEFT",
          logo: "",
          players: []
        },
        rightTeam: {
          name: "RIGHT",
          logo: "",
          players: []
        },
        maps: [
          {
            label: "CURRENT",
            name: "Haven",
            picker: "left"
          },
          {
            label: "NEXT",
            name: "Ascent",
            picker: "right"
          },
          {
            label: "DECIDER",
            name: "Sunset",
            picker: "none"
          }
        ]
      };
    }

    function setValue(id, value, fallback) {
      if (!get(id)) {
        return;
      }

      if (value === undefined || value === null || value === "") {
        get(id).value = fallback;
      } else {
        get(id).value = value;
      }
    }

    function getPlayer(teamKey, index) {
      if (!currentData || !currentData[teamKey] || !currentData[teamKey].players) {
        return {};
      }

      return currentData[teamKey].players[index] || {};
    }

    function findAgent(name) {
      var value = String(name || "").trim().toLowerCase();

      if (!value || value === "?") {
        return null;
      }

      for (var i = 0; i < agents.length; i++) {
        if (agents[i].name.toLowerCase() === value) {
          return agents[i];
        }
      }

      return null;
    }

    async function loadAgents() {
      try {
        var response = await fetch("https://valorant-api.com/v1/agents?language=ru-RU&isPlayableCharacter=true");
        var result = await response.json();

        agents = result.data.map(function (item) {
          return {
            name: item.displayName,
            uuid: item.uuid,
            icon: item.displayIcon
          };
        }).sort(function (a, b) {
          return a.name.localeCompare(b.name);
        });
      } catch (error) {
        agents = [];
      }

      var list = get("agentsList");
      list.innerHTML = "";

      for (var i = 0; i < agents.length; i++) {
        var option = document.createElement("option");
        option.value = agents[i].name;
        list.appendChild(option);
      }
    }

    async function loadLogos() {
      try {
        var response = await fetch("logos.json?t=" + Date.now());
        logos = await response.json();

        if (!Array.isArray(logos)) {
          logos = [];
        }
      } catch (error) {
        logos = [];
      }
    }

    function fillLogoSelect(id, selectedValue) {
      var select = get(id);

      if (!select) {
        return;
      }

      select.innerHTML = "";

      var empty = document.createElement("option");
      empty.value = "";
      empty.textContent = "Без логотипа";
      select.appendChild(empty);

      for (var i = 0; i < logos.length; i++) {
        var option = document.createElement("option");
        option.value = logos[i].url;
        option.textContent = logos[i].name;
        select.appendChild(option);
      }

      if (selectedValue) {
        var exists = false;

        for (var j = 0; j < select.options.length; j++) {
          if (select.options[j].value === selectedValue) {
            exists = true;
          }
        }

        if (!exists) {
          var custom = document.createElement("option");
          custom.value = selectedValue;
          custom.textContent = "Текущий логотип";
          select.appendChild(custom);
        }

        select.value = selectedValue;
      }
    }

    function updateLogoPreview(selectId, previewId) {
      var value = get(selectId).value;
      var img = get(previewId);

      if (value) {
        img.src = value;
        img.style.visibility = "visible";
      } else {
        img.removeAttribute("src");
        img.style.visibility = "hidden";
      }
    }

    function fillLogoSelects() {
      var leftCurrent = "";
      var rightCurrent = "";

      if (currentData && currentData.leftTeam) {
        leftCurrent = currentData.leftTeam.logo || "";
      }

      if (currentData && currentData.rightTeam) {
        rightCurrent = currentData.rightTeam.logo || "";
      }

      fillLogoSelect("leftLogo", leftCurrent);
      fillLogoSelect("rightLogo", rightCurrent);

      updateLogoPreview("leftLogo", "leftLogoPreview");
      updateLogoPreview("rightLogo", "rightLogoPreview");
    }

    function fillMapSelects() {
      for (var i = 0; i < 3; i++) {
        var select = get("map_" + i + "_name");

        if (!select) {
          continue;
        }

        select.innerHTML = "";

        for (var m = 0; m < mapsList.length; m++) {
          var option = document.createElement("option");
          option.value = mapsList[m];
          option.textContent = mapsList[m];
          select.appendChild(option);
        }
      }
    }

    function updatePreview(prefix, index) {
      var agentName = get(prefix + "_" + index + "_agent").value;
      var img = get(prefix + "_" + index + "_preview");
      var agent = findAgent(agentName);

      if (agent && agent.icon) {
        img.src = agent.icon;
        img.style.visibility = "visible";
      } else {
        img.removeAttribute("src");
        img.style.visibility = "hidden";
      }
    }

    function createRows(rootId, prefix) {
      var root = get(rootId);
      root.innerHTML = "";

      for (var i = 0; i < 5; i++) {
        var row = document.createElement("div");
        row.className = "player-row";

        row.innerHTML =
          '<div class="num">' + (i + 1) + '</div>' +
          '<div class="field">' +
            '<label>Ник</label>' +
            '<input id="' + prefix + '_' + i + '_name">' +
          '</div>' +
          '<div class="field">' +
            '<label>Агент</label>' +
            '<input id="' + prefix + '_' + i + '_agent" list="agentsList" placeholder="?">' +
          '</div>' +
          '<img id="' + prefix + '_' + i + '_preview" class="agent-preview">';

        root.appendChild(row);
      }
    }

    function fillPlayer(prefix, teamKey, index) {
      var player = getPlayer(teamKey, index);

      setValue(prefix + "_" + index + "_name", player.name, "");
      setValue(prefix + "_" + index + "_agent", player.agent, "?");

      var input = get(prefix + "_" + index + "_agent");

      input.addEventListener("input", function () {
        updatePreview(prefix, index);
      });

      updatePreview(prefix, index);

      if (player.agentIcon) {
        get(prefix + "_" + index + "_preview").src = player.agentIcon;
        get(prefix + "_" + index + "_preview").style.visibility = "visible";
      }
    }

    function fillTeam(prefix, teamKey) {
      for (var i = 0; i < 5; i++) {
        fillPlayer(prefix, teamKey, i);
      }
    }

    function readPlayer(prefix, index) {
      var agentName = get(prefix + "_" + index + "_agent").value || "?";
      var agent = findAgent(agentName);

      return {
        name: get(prefix + "_" + index + "_name").value || "Player " + (index + 1),
        agent: agent ? agent.name : agentName,
        agentIcon: agent ? agent.icon : ""
      };
    }

    function readTeam(prefix) {
      var players = [];

      for (var i = 0; i < 5; i++) {
        players.push(readPlayer(prefix, i));
      }

      return players;
    }

    function renderEditor(data) {
      var defaults = defaultData();

      currentData = data || defaults;

      if (currentData.showMaps === undefined) {
        currentData.showMaps = true;
      }

      if (!currentData.leftTeam) {
        currentData.leftTeam = defaults.leftTeam;
      }

      if (!currentData.rightTeam) {
        currentData.rightTeam = defaults.rightTeam;
      }

      if (!currentData.maps) {
        currentData.maps = defaults.maps;
      }

      setValue("leftTeamName", currentData.leftTeam.name, "LEFT");
      setValue("rightTeamName", currentData.rightTeam.name, "RIGHT");

      fillLogoSelects();

      for (var i = 0; i < 3; i++) {
        var map = currentData.maps[i] || defaults.maps[i];

        setValue("map_" + i + "_label", map.label, defaults.maps[i].label);
        get("map_" + i + "_name").value = map.name || defaults.maps[i].name;
        get("map_" + i + "_picker").value = map.picker || "none";
      }

      updateMapsToggleButton();

      createRows("leftRows", "left");
      createRows("rightRows", "right");

      fillTeam("left", "leftTeam");
      fillTeam("right", "rightTeam");
    }

    async function saveData() {
      if (!auth.currentUser) {
        get("status").textContent = "Сначала войди";
        get("status").className = "status danger";
        return;
      }

      var data = {
        showMaps: currentData && currentData.showMaps === false ? false : true,

        leftTeam: {
          name: get("leftTeamName").value || "LEFT",
          logo: get("leftLogo").value || "",
          players: readTeam("left")
        },

        rightTeam: {
          name: get("rightTeamName").value || "RIGHT",
          logo: get("rightLogo").value || "",
          players: readTeam("right")
        },

        maps: [
          {
            label: get("map_0_label").value || "CURRENT",
            name: get("map_0_name").value || "Haven",
            picker: get("map_0_picker").value || "none"
          },
          {
            label: get("map_1_label").value || "NEXT",
            name: get("map_1_name").value || "Ascent",
            picker: get("map_1_picker").value || "none"
          },
          {
            label: get("map_2_label").value || "DECIDER",
            name: get("map_2_name").value || "Sunset",
            picker: get("map_2_picker").value || "none"
          }
        ]
      };

      try {
        await hudRef.set(data);

        currentData = data;
        get("status").textContent = "Сохранено";
        get("status").className = "status";

        setTimeout(function () {
          get("status").textContent = "";
        }, 1500);
      } catch (error) {
        get("status").textContent = "Ошибка сохранения";
        get("status").className = "status danger";
      }
    }

    function mapsAreVisible() {
      if (!currentData) {
        return true;
      }

      return currentData.showMaps !== false;
    }

    function updateMapsToggleButton() {
      var button = get("toggleMapsButton");

      if (!button) {
        return;
      }

      if (mapsAreVisible()) {
        button.textContent = "Выключить карты и пики в HUD";
        button.className = "toggle-maps-button enabled";
      } else {
        button.textContent = "Включить карты и пики в HUD";
        button.className = "toggle-maps-button disabled";
      }
    }

    async function toggleMapsVisibility() {
      if (!auth.currentUser) {
        get("status").textContent = "Сначала войди";
        get("status").className = "status danger";
        return;
      }

      if (!currentData) {
        currentData = defaultData();
      }

      currentData.showMaps = currentData.showMaps === false ? true : false;

      updateMapsToggleButton();

      await saveData();

      if (currentData.showMaps === false) {
        get("status").textContent = "Карты и пики выключены";
      } else {
        get("status").textContent = "Карты и пики включены";
      }

      get("status").className = "status";

      setTimeout(function () {
        get("status").textContent = "";
      }, 1500);
    }

    function swapInputValues(leftId, rightId) {
      var leftValue = get(leftId).value;
      var rightValue = get(rightId).value;

      get(leftId).value = rightValue;
      get(rightId).value = leftValue;
    }

    async function swapSides() {
      if (!auth.currentUser) {
        get("status").textContent = "Сначала войди";
        get("status").className = "status danger";
        return;
      }

      swapInputValues("leftTeamName", "rightTeamName");
      swapInputValues("leftLogo", "rightLogo");

      updateLogoPreview("leftLogo", "leftLogoPreview");
      updateLogoPreview("rightLogo", "rightLogoPreview");

      for (var i = 0; i < 5; i++) {
        swapInputValues("left_" + i + "_name", "right_" + i + "_name");
        swapInputValues("left_" + i + "_agent", "right_" + i + "_agent");

        updatePreview("left", i);
        updatePreview("right", i);
      }

      await saveData();

      get("status").textContent = "Стороны поменяны";
      get("status").className = "status";

      setTimeout(function () {
        get("status").textContent = "";
      }, 1500);
    }

    async function login() {
      var email = get("email").value;
      var password = get("password").value;

      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (error) {
        get("loginStatus").textContent = "Ошибка входа";
        get("loginStatus").className = "status danger";
      }
    }

    async function logout() {
      await auth.signOut();
    }

    auth.onAuthStateChanged(function (user) {
      if (user) {
        get("loginStatus").textContent = "Вошёл";
        get("loginStatus").className = "status";
      } else {
        get("loginStatus").textContent = "Не вошёл";
        get("loginStatus").className = "status danger";
      }
    });

    async function main() {
      await loadAgents();
      await loadLogos();

      fillMapSelects();

      get("leftLogo").addEventListener("change", function () {
        updateLogoPreview("leftLogo", "leftLogoPreview");
      });

      get("rightLogo").addEventListener("change", function () {
        updateLogoPreview("rightLogo", "rightLogoPreview");
      });

      hudRef.on("value", function (snapshot) {
        renderEditor(snapshot.val() || defaultData());
      });
    }

    main();
  </script>
</body>
</html>
